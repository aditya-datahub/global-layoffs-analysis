name: Run Jupyter Notebook

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write        # ← This fixes the 403 error

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas matplotlib seaborn notebook nbconvert

    - name: Execute Jupyter Notebook
      run: |
        jupyter nbconvert --to notebook --execute layoffs_analysis.ipynb \
          --inplace --ExecutePreprocessor.kernel_name=python3

    - name: Commit and push updated notebook
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add layoffs_analysis.ipynb
        git commit -m "Auto-update notebook output" || echo "No changes to commit"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
